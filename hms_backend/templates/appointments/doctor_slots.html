<h2>Available Slots for Dr. {{doctor.user.username}}</h2>
<table border="1">
    <tr>
        <th>Date</th>
        <th>Start</th>
        <th>End</th>
        <th>Book</th>
    </tr>
    {% for slot in slots %}
        <tr>
            <td>{{slot.date}}</td>
            <td>{{slot.start_time}}</td>
            <td>{{slot.end_time}}</td>
            <td>
                <a href="/patient/book/{{slot.id}}/">
                    Book
                </a>
            </td>
        </tr>
    {% endfor %}
</table>
